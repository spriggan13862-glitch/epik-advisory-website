<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">Epik Advisory Logo</title>
  <desc id="desc">Light Epik Advisory wordmark for a dark website header, with white EPI letters and gold K.</desc>

  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3d67a"></stop>
      <stop offset="45%" stop-color="#c8a84a"></stop>
      <stop offset="100%" stop-color="#9f7220"></stop>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.35"></feDropShadow>
    </filter>
  </defs>

  <rect width="1200" height="360" fill="none"></rect>

  <g filter="url(#softShadow)">
    <text x="110" y="150" font-family="Arial, Helvetica, sans-serif" font-size="128" font-weight="700" letter-spacing="26" fill="#f7f7f4">EPI</text>

    <text x="395" y="150" font-family="Arial, Helvetica, sans-serif" font-size="128" font-weight="700" letter-spacing="0" fill="url(#gold)">K</text>

    <text x="92" y="255" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="500" letter-spacing="24" fill="#f7f7f4">ADVISORY</text>
  </g>
</svg>